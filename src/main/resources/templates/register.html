```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>SecureVault - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#050816,#0d1b2a,#001d3d);
            font-family:Segoe UI;
        }

        .register-card{
            width:430px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);
            border-radius:20px;
            padding:35px;
            color:white;
            box-shadow:0 0 30px rgba(0,140,255,.25);
        }

        .logo{
            text-align:center;
            font-size:55px;
            color:#4da3ff;
        }

        h2{
            text-align:center;
            font-weight:bold;
        }

        p{
            text-align:center;
            color:#d0d0d0;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:none;
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,.15);
            color:white;
            box-shadow:0 0 12px #0d6efd;
        }

        .btn-register{
            width:100%;
            border-radius:30px;
            font-weight:bold;
            transition:.3s;
        }

        .btn-register:hover{
            transform:scale(1.03);
            box-shadow:0 0 20px #198754;
        }

        a{
            color:#66b2ff;
            text-decoration:none;
        }

        a:hover{
            color:white;
        }

        .footer{
            text-align:center;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="register-card">

    <div class="logo">
        <i class="bi bi-person-plus-fill"></i>
    </div>

    <h2>Create Account</h2>

    <p>Join SecureVault</p>

    <form action="/register" method="post">

        <div class="mb-3">

            <label>Username</label>

            <input
                type="text"
                class="form-control"
                name="username"
                placeholder="Choose a username"
                required>

        </div>

        <div class="mb-4">

            <label>Password</label>

            <input
                type="password"
                class="form-control"
                name="password"
                placeholder="Choose a password"
                required>

        </div>

        <button class="btn btn-success btn-register">

            <i class="bi bi-person-check-fill"></i>

            Create Account

        </button>

    </form>

    <div class="footer">

        Already have an account?

        <a href="/">
            Login
        </a>

    </div>

</div>

</body>

</html>
```
